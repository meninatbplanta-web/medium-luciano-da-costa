<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acesse os canais oficiais, agende sua consulta ou conheça o e-book 'Os Três Acertos' do Professor Luciano da Costa.">
    <meta name="author" content="Luciano da Costa">
    <title>Professor Luciano da Costa - Links Úteis</title>
    
    <!-- Google Fonts: Playfair Display & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- FontAwesome for Brand Icons (TikTok, Instagram, YouTube) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="links.css">
</head>
<body>
    <div class="links-bg-glow"></div>
    
    <div class="links-container">
        <!-- Profile Header -->
        <header class="profile-header">
            <div class="profile-avatar-wrapper">
                <img src="assets/luciano.jpg" alt="Professor Luciano da Costa" class="profile-avatar">
            </div>
            <h1 class="profile-name">Luciano da Costa</h1>
            <p class="profile-tagline">Espiritualidade consciente e prática responsável</p>
        </header>
        
        <!-- Buttons Group -->
        <main class="links-list">
            <!-- Botão 1: Agendar Consulta (WhatsApp) -->
            <a href="https://api.whatsapp.com/send?phone=558197426518&text=Ol%C3%A1%20Luciano%2C%20estou%20no%20site%20e%20gostaria%20de%20agendar%20uma%20consulta" 
               class="link-button highlight" 
               id="btn-whatsapp-consultation"
               target="_blank" 
               rel="noopener noreferrer">
                <div class="link-icon">
                    <i data-lucide="calendar"></i>
                </div>
                <span class="link-text">Agendar Consulta</span>
                <div class="link-arrow">
                    <i data-lucide="chevron-right"></i>
                </div>
            </a>
            
            <!-- Botão 2: Página do Livro -->
            <a href="ebook.html" 
               class="link-button" 
               id="btn-book-page">
                <div class="link-icon">
                    <i data-lucide="book-open"></i>
                </div>
                <span class="link-text">E-book: Os Três Acertos</span>
                <div class="link-arrow">
                    <i data-lucide="chevron-right"></i>
                </div>
            </a>
        </main>
        
        <!-- Social Icons Footer -->
        <footer class="social-footer">
            <div class="social-links">
                <!-- Instagram -->
                <a href="https://www.instagram.com/lucianodacosta50/" 
                   class="social-icon-btn" 
                   id="social-instagram"
                   target="_blank" 
                   rel="noopener noreferrer" 
                   aria-label="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                
                <!-- TikTok -->
                <a href="https://www.tiktok.com/@lucianodacosta45" 
                   class="social-icon-btn" 
                   id="social-tiktok"
                   target="_blank" 
                   rel="noopener noreferrer" 
                   aria-label="TikTok">
                    <i class="fa-brands fa-tiktok"></i>
                </a>
                
                <!-- YouTube -->
                <a href="https://www.youtube.com/channel/UCvug-h4e4ZTD_qq8a4Miqkg" 
                   class="social-icon-btn" 
                   id="social-youtube"
                   target="_blank" 
                   rel="noopener noreferrer" 
                   aria-label="YouTube">
                    <i class="fa-brands fa-youtube"></i>
                </a>
            </div>
            
            <p class="copyright-text">&copy; 2026 Luciano da Costa. Todos os direitos reservados.</p>
        </footer>
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
